version: 2

project_name: rousseau-agent

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: rousseau
    main: ./cmd/rousseau
    binary: rousseau
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
      - riscv64
    goarm:
      - "6"
      - "7"
    ignore:
      # Windows-on-ARM only ships amd64; skip the ARM variants there.
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: riscv64
      # macOS only ships amd64 + arm64; drop the Linux-specific arches.
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: riscv64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sebastienrousseau/rousseau-agent/internal/cli.version={{.Version}}
      - -X github.com/sebastienrousseau/rousseau-agent/internal/cli.commit={{.Commit}}
      - -X github.com/sebastienrousseau/rousseau-agent/internal/cli.buildDate={{.Date}}

  # `rousseau-lite` — same source built with -tags no_whatsmeow.
  # ~14% smaller binary for operators who don't need WhatsApp.
  - id: rousseau-lite
    main: ./cmd/rousseau
    binary: rousseau
    env:
      - CGO_ENABLED=0
    tags:
      - no_whatsmeow
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
      - riscv64
    goarm:
      - "6"
      - "7"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sebastienrousseau/rousseau-agent/internal/cli.version={{.Version}}-lite
      - -X github.com/sebastienrousseau/rousseau-agent/internal/cli.commit={{.Commit}}
      - -X github.com/sebastienrousseau/rousseau-agent/internal/cli.buildDate={{.Date}}

archives:
  - id: default
    builds: [rousseau]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - SECURITY.md
  - id: lite
    builds: [rousseau-lite]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-lite_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - LICENSE
      - README.md
      - SECURITY.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# SBOM per release — CycloneDX format from anchore/syft. Consumers can
# audit the exact set of packages that went into the binary.
sboms:
  - artifacts: archive
    documents:
      - "${artifact}.cyclonedx.sbom.json"
    cmd: syft
    args: ["scan", "$artifact", "--output", "cyclonedx-json=$document"]

# Cosign-signed checksums so release consumers can verify provenance
# without trusting the GitHub tarball alone.
signs:
  - cmd: cosign
    stdin: '{{ .Env.COSIGN_PASSWORD }}'
    args:
      - "sign-blob"
      - "--yes"
      - "--key=env://COSIGN_PRIVATE_KEY"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
