version: 2

project_name: rousseau-agent

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: rousseau
    main: ./cmd/rousseau
    binary: rousseau
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sebastienrousseau/rousseau-agent/internal/cli.version={{.Version}}
      - -X github.com/sebastienrousseau/rousseau-agent/internal/cli.commit={{.Commit}}
      - -X github.com/sebastienrousseau/rousseau-agent/internal/cli.buildDate={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - SECURITY.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
