name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vet:
    name: vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
      - run: go vet ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
      - run: go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...
      - name: coverage floor
        if: matrix.os == 'ubuntu-latest'
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "coverage: $pct%"
          # Coverage floor tracks the current baseline. Pure business logic sits
          # around 85–100%; overall floor is 75% because ~20% of statements
          # are WebSocket dial paths (Slack Socket Mode, Discord Gateway,
          # whatsmeow), signal-cli subprocess management, and cobra RunE
          # closures that launch daemons — each testable only with a
          # dedicated network fake. Raising this floor is a real goal;
          # padding it with meaningless tests is not.
          awk -v p="$pct" 'BEGIN { exit (p+0 >= 75) ? 0 : 1 }' || { echo "coverage below 75%"; exit 1; }

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [vet, lint, test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
      - run: go build -trimpath ./...
