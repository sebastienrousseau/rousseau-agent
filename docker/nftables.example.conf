# rousseau-agent egress filter — kernel-level allowlist example.
#
# Layers on top of the Podman rootless container to guarantee outbound
# traffic only reaches the endpoints rousseau actually needs. Load
# with:
#
#     sudo nft -f docker/nftables.example.conf
#
# This is NOT installed by the default install script — it's an
# opt-in production-hardening layer. Edit the address sets to match
# your provider mix before loading.
#
# Verify with (after loading):
#
#     sudo nft list ruleset
#     # From inside the container:
#     podman exec rousseau-agent nslookup api.anthropic.com
#     podman exec rousseau-agent curl -sI https://api.anthropic.com
#     # Should fail: any hostname not in the allowlist
#     podman exec rousseau-agent curl -sI https://example.com

table inet rousseau {

    # Meta / WhatsApp Web — Facebook's ASN 32934.
    set whatsapp_v4 {
        type ipv4_addr; flags interval;
        elements = {
            157.240.0.0/16,   # facebook.com / whatsapp.com
            179.60.192.0/22,  # facebook edge
            185.60.216.0/22,  # facebook edge
            31.13.24.0/21,    # facebook
        }
    }

    # Anthropic — via CloudFront (their /24 changes). This set is a
    # best-effort snapshot; refresh with:
    #   dig +short api.anthropic.com | sort -u
    # or use a DNS-based resolver (unbound) instead.
    set anthropic_v4 {
        type ipv4_addr; flags interval;
        elements = {
            160.79.104.0/23,
        }
    }

    # OpenAI (api.openai.com is behind Cloudflare — same caveat).
    set openai_v4 {
        type ipv4_addr; flags interval;
        elements = {
            104.16.0.0/13,    # Cloudflare Anycast (broad)
        }
    }

    # Signal (signal-cli reaches Signal's servers, on chat.signal.org
    # and cdn*.signal.org, both AWS us-west-2).
    # (Populate from signal-cli logs or Signal's public docs.)
    set signal_v4 {
        type ipv4_addr; flags interval;
        elements = {
            0.0.0.0/32,   # placeholder — replace with the actual set
        }
    }

    # Container network — the rootless bridge on the host side. Adjust
    # to match `podman network inspect podman | grep Subnet`.
    set rousseau_source {
        type ipv4_addr; flags interval;
        elements = { 10.88.0.0/16 }
    }

    chain output {
        type filter hook output priority filter; policy drop;

        # Match packets originating from the rousseau container's
        # source range; allow only to the whitelisted destinations.
        ip saddr @rousseau_source ip daddr @whatsapp_v4 accept
        ip saddr @rousseau_source ip daddr @anthropic_v4 accept
        ip saddr @rousseau_source ip daddr @openai_v4 accept
        ip saddr @rousseau_source ip daddr @signal_v4 accept

        # DNS to the systemd-resolved stub (or your resolver). Restrict
        # to UDP+TCP 53 to your resolver's address.
        ip saddr @rousseau_source ip daddr 127.0.0.53 udp dport 53 accept
        ip saddr @rousseau_source ip daddr 127.0.0.53 tcp dport 53 accept

        # Everything else from the container is dropped by the policy
        # above. Non-container traffic is untouched (matches nothing
        # in this chain).
    }
}

# NOTE: For a DNS-resolving allowlist (recommended over IP CIDRs),
# use dnsmasq with --address, or run an unbound instance alongside
# rousseau and point the container at that resolver.
